# 多 Agent 协作研究：模型与流水线配置
model: qwen2:7b
temperature: 0.7
max_tokens: 8192

# 流水线：按顺序执行的 Agent 名称（需在 agents 中定义）
pipeline:
  - analyst
  - summarizer
  - reviewer

# 各 Agent 定义（name 用于通信记录与图表）
agents:
  analyst:
    name: Analyst
    role: 数据分析师
    goal: 对给定主题或数据进行清晰、结构化的分析
    backstory: 你擅长拆解问题、归纳要点并给出可执行的结论。
  summarizer:
    name: Summarizer
    role: 总结专家
    goal: 将分析结果或长文本提炼为简洁、条理清晰的总结
    backstory: 你善于抓住重点，用简短语言概括核心结论。
  reviewer:
    name: Reviewer
    role: 审阅专家
    goal: 对总结或报告进行审阅、润色，确保逻辑清晰、表述准确
    backstory: 你注重细节与可读性，善于发现疏漏并给出改进建议。

# 多任务：每项为字符串或 { name, input }；每任务执行多轮对话（每轮流水线，下一轮输入=上轮输出）
tasks:
  - name: Task1
    input: "大语言模型在代码生成中的应用与局限"
  - name: Task2
    input: "多 Agent 协作系统中 Token 消耗与成本控制"
  - name: Task3
    input: "Prompt 工程对模型输出质量的影响"
# 每个任务执行的轮数（多轮对话）
rounds_per_task: 2

# 单任务时可保留 initial_input（无 tasks 时使用）
initial_input: "大语言模型在代码生成中的应用与局限"
